# Optional manual deploy (publish profile + client-secret secrets: AZURE_CLIENT_ID, etc.).
# Primary deploy: main_streamflo-sharepoint-digest.yml (OIDC, push to main → Streamflo Function App).
# Do not point secrets or app-name at the old Ingot tenant unless you intend to.
name: Deploy to Azure Function

on:
  # Manual only — avoids duplicate push deploys and empty runs next to streamflo workflow.
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.'
  DOTNET_VERSION: '8.0.x'
  # Set below or add a workflow_dispatch input later; avoid vars.* in env (can fail evaluation on some repos).
  # If you use this workflow, set app name + AZURE_* / publish profile secrets to the same tenant.
  AZURE_FUNCTIONAPP_NAME: streamflo-sharepoint-digest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy target
        run: |
          echo "Function App: ${{ env.AZURE_FUNCTIONAPP_NAME }}"
          echo "Edit AZURE_FUNCTIONAPP_NAME in this workflow to change target."

      - name: Ensure upstream code (sync from a1ch if this is a fork with old code)
        run: |
          if ! grep -q "GetFieldString(IDictionary" Services/SharePointDigestService.cs; then
            echo "::error::This checkout has old code. Syncing from a1ch/sharpoint-notifications-replacement main..."
            git remote add upstream https://github.com/a1ch/sharpoint-notifications-replacement.git 2>/dev/null || true
            git fetch upstream main
            git reset --hard upstream/main
            echo "Synced. Proceeding with build."
          fi
          echo "Repository: ${{ github.repository }}, Commit: $(git rev-parse HEAD)"

      - name: Verify repo and commit
        run: |
          echo "GetFieldString(IDictionary) present: $(grep -c 'GetFieldString(IDictionary' Services/SharePointDigestService.cs || echo 0)"
          echo "Sites[hostAndPath] present: $(grep -c 'Sites\[hostAndPath\]' Services/SharePointDigestService.cs || echo 0)"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish (framework-dependent for Flex Consumption .NET 8 host)
        run: dotnet publish --configuration Release --output '${{ runner.temp }}/publish'

      - name: Login to Azure (required for RBAC deploy)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Ensure .NET Isolated worker runtime settings
        if: ${{ secrets.AZURE_FUNCTIONAPP_RESOURCE_GROUP != '' }}
        run: |
          az functionapp config appsettings set --name ${{ env.AZURE_FUNCTIONAPP_NAME }} --resource-group ${{ secrets.AZURE_FUNCTIONAPP_RESOURCE_GROUP }} --settings FUNCTIONS_WORKER_RUNTIME=dotnet-isolated WEBSITE_USE_PLACEHOLDER_DOTNETISOLATED=1 --output none
          echo "Set FUNCTIONS_WORKER_RUNTIME and WEBSITE_USE_PLACEHOLDER_DOTNETISOLATED."

      # If deploy fails with storage auth errors, see docs/DEPLOY-TROUBLESHOOTING.md
      - name: Deploy to Azure Function
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: '${{ runner.temp }}/publish'
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
